<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recoveco Diseño 88</title>

<style>
:root{
  --bg: #EDE9E1;
  --text: #2E2E2E;
  --btn: #000000;
  --btnText: #FFFFFF;
}

*{
  box-sizing: border-box;
}

body{
  margin:0;
  min-height:100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
  padding: 30px 18px;
}

.container{
  width:100%;
  max-width:500px;
  text-align:center;
}

.logo{
  width:100%;
  max-width:320px;
  margin: 0 auto 20px;
  display:block;
  padding: 10px 0;
}

p{
  margin-bottom:30px;
  color: rgba(46,46,46,0.7);
  font-size:15px;
}

.btn{
  display:block;
  width:100%;
  background: var(--btn);
  color: var(--btnText);
  text-decoration:none;
  padding:18px;
  border-radius:14px;
  font-size:19px;
  margin:14px 0;
  box-shadow:0 10px 20px rgba(0,0,0,0.12);
  transition: all .15s ease;
}

.btn:hover{
  transform: translateY(-1px);
  box-shadow:0 14px 28px rgba(0,0,0,0.16);
}

@media (max-width:420px){
  .btn{font-size:17px;}
  .logo{max-width:260px;}
}
</style>
</head>

<body>

<div class="container">

<img src="Logo Recoveco.png" alt="Recoveco Diseño 88" class="logo">

<p>Diseño, estilo y detalles que marcan la diferencia.</p>

</a>

</div>

</body>
</html>
